<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background -->
  <rect width="64" height="64" rx="12" fill="#1A3A5C"/>
  <!-- Gold top accent bar -->
  <rect x="0" y="0" width="64" height="5" rx="4" fill="#C9A84C"/>
  <rect x="0" y="3" width="64" height="2" fill="#C9A84C"/>

  <!-- Mortarboard cap top diamond -->
  <polygon points="32,8 14,20 32,28 50,20" fill="#C9A84C"/>
  <polygon points="32,8 14,20 32,24 50,20" fill="#A8872E"/>

  <!-- Cap cylinder -->
  <ellipse cx="32" cy="28" rx="12" ry="4" fill="#C9A84C"/>
  <rect x="20" y="25" width="24" height="6" fill="#C9A84C"/>
  <ellipse cx="32" cy="31" rx="12" ry="4" fill="#A8872E"/>

  <!-- Tassel -->
  <line x1="48" y1="20" x2="52" y2="34" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="52" cy="36" r="2.5" fill="#C9A84C"/>

  <!-- Checkmark circle -->
  <circle cx="32" cy="48" r="10" fill="none" stroke="#C9A84C" stroke-width="2"/>
  <!-- Checkmark tick -->
  <polyline points="26,48 30,52 39,42" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
