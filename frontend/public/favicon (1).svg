<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark sidebar background -->
  <rect width="64" height="64" rx="12" fill="#101822"/>
  <!-- Green top accent -->
  <rect x="0" y="0" width="64" height="5" rx="4" fill="#0a846b"/>
  <rect x="0" y="3" width="64" height="2" fill="#0a846b"/>

  <!-- Mortarboard cap top -->
  <polygon points="32,9 13,21 32,29 51,21" fill="#1abb9b"/>
  <polygon points="32,9 13,21 32,25 51,21" fill="#0a846b"/>

  <!-- Cap cylinder -->
  <ellipse cx="32" cy="29" rx="13" ry="4.5" fill="#1abb9b"/>
  <rect x="19" y="26" width="26" height="7" fill="#1abb9b"/>
  <ellipse cx="32" cy="33" rx="13" ry="4.5" fill="#0a846b"/>

  <!-- Tassel -->
  <line x1="49" y1="21" x2="53" y2="35" stroke="#1abb9b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="53" cy="37" r="2.5" fill="#1abb9b"/>

  <!-- Checkmark circle -->
  <circle cx="32" cy="49" r="10" fill="none" stroke="#0eb392" stroke-width="2"/>
  <!-- Checkmark tick -->
  <polyline points="26,49 30,53 39,43" fill="none" stroke="#1abb9b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
