<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ASSIGNIFY | Smart Assignment Management</title>
    <meta name="description" content="Create assignments, share submission links, and track student submissions with Assignify." />

    <!-- Canonical URL — prevents www vs non-www duplicate indexing -->
    <link rel="canonical" href="https://assignify.com.ng/" />

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />

    <!-- OG / Social -->
    <meta property="og:title" content="ASSIGNIFY | Smart Assignment Management" />
    <meta property="og:description" content="Create assignments, share submission links, and track student submissions with Assignify." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://assignify.com.ng" />
    <meta property="og:image" content="https://assignify.com.ng/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ASSIGNIFY | Smart Assignment Management" />
    <meta name="twitter:description" content="Create assignments, share submission links, and track student submissions with Assignify." />
    <meta name="twitter:image" content="https://assignify.com.ng/og-image.png" />
    <script>
      (function () {
        var hash = window.location.hash;
        if (hash && hash.includes('access_token')) {
          var params = new URLSearchParams(hash.replace('#', ''));
          var type = params.get('type');
          if (type === 'recovery') {
            // Password reset — go to reset password page
            window.location.replace('/reset-password' + window.location.hash);
          }
          // signup type handled by Supabase automatically
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
